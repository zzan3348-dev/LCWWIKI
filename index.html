<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HΣΛTWΔRΞ 설정 생성기</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  --accent:#b3131b;
  --accent2:#e11d24;
  --boxColor:#111827;
  --orgMain:#06456f;
  --orgSub:#bfd0e3;
  --orgText:#ffd400;
  --orgBadge:#1f6fa7;
  --orgBadgeText:#ffffff;
  --orgNote:#f2f2f2;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:#070707;
  color:#f5f5f5;
  font-family:Arial,'Noto Sans KR',sans-serif;
}
header{
  min-height:64px;
  background:#0b0b0d;
  border-bottom:2px solid var(--accent);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:12px 22px;
  position:sticky;
  top:0;
  z-index:10;
}
.logo{
  font-weight:900;
  font-size:22px;
}
.logo span{color:var(--accent2)}
.menu{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.menu button{
  background:transparent;
  color:#eee;
  border:1px solid #333;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:800;
}
.menu button:hover,.menu button.active{
  background:var(--accent);
  border-color:var(--accent2);
}
.hidden{display:none!important}

/* HOME */
.home-screen{
  min-height:calc(100vh - 64px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:46px 20px;
  background:
    radial-gradient(circle at 22% 20%, rgba(225,29,36,.28), transparent 30%),
    radial-gradient(circle at 78% 72%, rgba(255,255,255,.08), transparent 30%),
    linear-gradient(135deg,#020202,#1a0506 60%,#000);
}
.hero-box{
  width:min(920px,92vw);
  border:1px solid rgba(255,255,255,.18);
  border-radius:28px;
  background:rgba(5,5,5,.78);
  padding:56px 44px;
  box-shadow:0 0 50px rgba(179,19,27,.34), inset 0 0 34px rgba(255,255,255,.04);
  position:relative;
}
.hero-box:before{
  content:"";
  position:absolute;
  inset:12px;
  border:1px solid rgba(225,29,36,.28);
  border-radius:22px;
  pointer-events:none;
}
.hero-kicker{
  color:#ef4444;
  font-weight:900;
  letter-spacing:.25em;
  font-size:13px;
  margin-bottom:14px;
}
.hero-title{
  margin:0 0 22px;
  color:white;
  font-size:clamp(36px,6vw,76px);
  line-height:1.05;
  font-weight:1000;
  text-shadow:0 0 20px rgba(239,68,68,.42);
}
.hero-actions a{
  position:relative;
  z-index:3;
  display:inline-block;
  border:1px solid rgba(255,255,255,.24);
  background:#b91c1c;
  color:#fff;
  border-radius:12px;
  padding:14px 20px;
  font-weight:900;
  text-decoration:none;
}

/* COMMON EDITOR */
.editor-screen,.org-screen{
  display:grid;
  grid-template-columns:330px minmax(360px,560px);
  gap:20px;
  padding:22px;
  justify-content:center;
}
.panel,.preview,.org-preview{
  background:#111;
  border:1px solid #2a2a2a;
  border-radius:14px;
  box-shadow:0 0 30px rgba(155,17,30,.18);
}
.panel{padding:18px}
.panel h2{
  margin:0 0 16px;
  border-left:5px solid var(--accent2);
  padding-left:10px;
}
.field{margin-bottom:12px}
.field label{
  display:block;
  font-size:13px;
  color:#bbb;
  margin-bottom:5px;
  font-weight:800;
}
input,textarea{
  width:100%;
  background:#1b1b1b;
  color:#fff;
  border:1px solid #444;
  border-radius:8px;
  padding:9px;
  font-size:14px;
}
input[type="color"]{height:42px;padding:4px}
textarea{min-height:66px;resize:vertical}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.btn{
  width:100%;
  border:0;
  background:var(--accent);
  color:white;
  border-radius:9px;
  padding:11px;
  margin-top:8px;
  font-weight:900;
  cursor:pointer;
}
.btn.secondary{
  background:#272727;
  border:1px solid #555;
}
.btn:hover{filter:brightness(1.12)}
.small{
  font-size:12px;
  color:#aaa;
  line-height:1.5;
  margin-top:10px;
}
.remove{
  float:right;
  background:#222;
  color:#fff;
  border:1px solid #555;
  border-radius:6px;
  cursor:pointer;
}
.section-item textarea{display:none}
.section-item input{
  font-weight:900;
  color:#ffd8d8;
}
.image-options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.image-options button{
  padding:9px 10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.18);
  background:#151515;
  color:#fff;
  cursor:pointer;
  font-weight:800;
}
.image-options button.active{
  background:#b91c1c;
  border-color:#ef4444;
}

/* WIKI CARD */
.preview{
  padding:0;
  overflow:hidden;
  max-width:560px;
}
.wiki-title{
  background:var(--boxColor);
  border-bottom:2px solid var(--accent2);
  text-align:center;
  padding:12px;
}
.wiki-title .ko{
  font-size:22px;
  font-weight:900;
}
.wiki-title .en{
  font-size:14px;
  font-weight:800;
  color:#ddd;
  margin-top:3px;
}
.image-box{
  background:#08080a;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#777;
  font-weight:900;
  font-size:20px;
  border-bottom:1px solid #333;
  overflow:hidden;
}
.image-box.portrait{height:560px}
.image-box.landscape{height:320px}
.image-box img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center center;
  background:#08080a;
}
.info-table{
  width:100%;
  border-collapse:collapse;
  background:#f3f3f3;
  color:#111;
  font-size:14px;
}
.info-table th{
  width:118px;
  background:var(--boxColor);
  color:white;
  border:1px solid #cfcfcf;
  padding:9px;
  text-align:center;
}
.info-table td{
  border:1px solid #cfcfcf;
  padding:9px;
  white-space:pre-wrap;
}
.section-title td{
  background:#e9e9e9;
  font-weight:900;
  color:#9b111e;
  text-align:center;
  padding:8px;
}

/* GOVERNMENT ORG CHART */
.org-screen{
  grid-template-columns:340px minmax(680px,1040px);
}
.org-preview{
  background:#fff;
  color:#111;
  overflow:hidden;
  max-width:1040px;
}
.gov-chart{
  width:100%;
  background:#fff;
  border:1px solid #d8d8d8;
}
.gov-top{
  background:var(--orgMain);
  color:#fff;
  text-align:center;
  padding:10px 10px 8px;
}
.gov-logo-line{
  font-size:18px;
  font-weight:900;
  line-height:1.3;
}
.gov-logo-mark{
  display:inline-flex;
  width:24px;
  height:24px;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:#fff;
  color:var(--orgMain);
  margin-right:6px;
  font-size:15px;
  vertical-align:middle;
}
.gov-main-title{
  font-size:24px;
  font-weight:1000;
  margin-top:4px;
}
.gov-subtitle{
  background:#fff;
  color:#111;
  text-align:center;
  padding:8px;
  font-weight:900;
  border-bottom:1px solid #b9c6d3;
  font-size:16px;
}
.org-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-top:1px solid #d8e1ea;
}
.org-cell{
  border-right:1px solid #d8e1ea;
  border-bottom:1px solid #d8e1ea;
  min-width:0;
}
.org-cell.blank{background:var(--orgSub)}
.org-name{
  background:var(--orgMain);
  color:var(--orgText);
  text-align:center;
  font-weight:1000;
  padding:12px 6px;
  min-height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  word-break:keep-all;
}
.org-sub{
  background:var(--orgSub);
  min-height:34px;
  padding:7px 4px;
  text-align:center;
}
.badge{
  display:inline-block;
  background:var(--orgBadge);
  color:var(--orgBadgeText);
  border-radius:4px;
  padding:3px 6px;
  margin:2px;
  font-size:12px;
  line-height:1.15;
  font-weight:900;
  word-break:keep-all;
}
.org-note{
  text-align:center;
  background:var(--orgNote);
  padding:12px;
  font-size:13px;
  line-height:1.5;
  white-space:pre-wrap;
}
.org-legend-title{
  background:var(--orgMain);
  color:#fff;
  text-align:center;
  padding:8px;
  font-weight:900;
  font-size:13px;
}
.org-legend{
  background:#fff;
  text-align:center;
  padding:8px;
}
.legend-badge{
  display:inline-block;
  border:1px solid #1f2937;
  background:#fff;
  color:#111;
  border-radius:3px;
  padding:4px 7px;
  margin:3px;
  font-size:12px;
  font-weight:900;
}
.legend-badge.blue{
  background:var(--orgMain);
  color:var(--orgText);
}
.legend-badge.navy{
  background:var(--orgMain);
  color:#fff;
}
.org-controls-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.org-item{
  border:1px solid #333;
  border-radius:10px;
  padding:10px;
  background:#171717;
  margin-bottom:10px;
}
.org-item label{margin-top:6px}
.org-item .remove{
  float:none;
  width:100%;
  margin-top:8px;
  padding:7px;
}

/* SCREENSHOT MODE */
.exit-print,.save-image{
  display:none;
  position:fixed;
  top:14px;
  z-index:9999;
  color:#fff;
  border:1px solid #fff;
  border-radius:10px;
  padding:10px 14px;
  font-weight:900;
  cursor:pointer;
}
.exit-print{right:14px;background:#b3131b}
.save-image{right:168px;background:#111}
.print-mode .exit-print,.print-mode .save-image{display:block}
.print-mode header,.print-mode .panel{display:none}
.print-mode .editor-screen:not(.hidden),
.print-mode .org-screen:not(.hidden){
  display:block;
  padding:0;
}
.print-mode .preview,.print-mode .org-preview{
  border-radius:0;
  box-shadow:none;
  border:0;
  margin:0 auto;
}
.capturing .exit-print,.capturing .save-image{display:none!important}

@media(max-width:850px){
  header{align-items:flex-start;flex-direction:column}
  .menu{width:100%;overflow:auto}
  .menu button{white-space:nowrap}
  .editor-screen,.org-screen{grid-template-columns:1fr;padding:14px}
  .preview,.org-preview{max-width:none}
  .org-grid{grid-template-columns:repeat(2,1fr)}
}

.legend-item{
  border:1px solid #333;
  border-radius:10px;
  padding:10px;
  background:#171717;
  margin-bottom:10px;
}
.legend-grid{
  display:grid;
  grid-template-columns:44px 1fr;
  gap:8px;
}
.legend-colors{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.legend-item .remove{
  float:none;
  width:100%;
  margin-top:8px;
  padding:7px;
}


/* ===== FINAL ORG ALIGN FIX ===== */
.org-grid{
  align-items:stretch;
}
.org-cell{
  display:grid;
  grid-template-rows:50px 42px;
  min-height:92px;
}
.org-name{
  min-height:50px!important;
  height:50px!important;
  padding:8px 6px!important;
}
.org-sub{
  min-height:42px!important;
  height:42px!important;
  padding:6px 4px!important;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
}
.org-cell.blank .org-name,
.org-cell.blank .org-sub{
  background:var(--orgSub);
}
.badge{
  max-width:100%;
  white-space:nowrap;
}



/* ===== ORG TOP FLAG RECTANGLE FIX ===== */
.gov-logo-line{
  display:flex!important;
  align-items:center!important;
  justify-content:center!important;
  gap:8px!important;
}
.gov-logo-mark{
  display:inline-flex!important;
  width:64px!important;
  height:36px!important;
  border-radius:0!important;
  border:none!important;
  background:transparent!important;
  color:var(--orgMain)!important;
  overflow:hidden!important;
  align-items:center!important;
  justify-content:center!important;
  margin-right:0!important;
  font-size:12px!important;
  flex:0 0 auto!important;
  vertical-align:middle!important;
}
.gov-logo-mark img{
  width:100%!important;
  height:100%!important;
  object-fit:contain!important;
  object-position:center center!important;
  display:block!important;
  background:transparent!important;
}

</style>
</head>
<body>
<button class="exit-print" onclick="togglePrintMode()">← 편집으로 돌아가기</button>
<button class="save-image" onclick="saveAsImage()">📷 이미지 저장</button>

<header>
  <div class="logo"><span>HΣΛTWΔRΞ</span> 설정 생성기</div>
  <nav class="menu">
    <button id="navHome" class="active" onclick="showHome()">홈</button>
    <button id="navNation" onclick="showPage('nation')">국가 만들기</button>
    <button id="navPerson" onclick="showPage('person')">인물 만들기</button>
    <button id="navGroup" onclick="showPage('group')">단체 만들기</button>
    <button id="navOrg" onclick="showOrgChart()">조직도 만들기</button>
  </nav>
</header>

<section class="home-screen" id="homeScreen">
  <div class="hero-box">
    <div class="hero-kicker">LCW ARCHIVE SYSTEM</div>
    <h1 class="hero-title">HΣΛTWΔRΞ<br>공식 위키 사이트</h1>
    <div class="hero-actions">
      <a href="https://heartwarelcw.vercel.app/" target="_blank" rel="noopener noreferrer">공식사이트 방문하기</a>
    </div>
  </div>
</section>

<main id="editorScreen" class="editor-screen hidden">
  <section class="panel">
    <h2 id="editorTitle">국가 만들기</h2>

    <div class="row">
      <div class="field">
        <label>상단 이름</label>
        <input id="titleKo" value="국가명" oninput="render()">
      </div>
      <div class="field">
        <label>영문/부제</label>
        <input id="titleEn" value="Nation Profile" oninput="render()">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>상단 박스 색상</label>
        <input type="color" id="boxColor" value="#111827" oninput="setBoxColor(this.value)">
      </div>
      <div class="field">
        <label>대표 이미지</label>
        <input type="file" accept="image/*" onchange="loadImage(event)">
      </div>
    </div>

    <div class="field">
      <label>이미지 비율</label>
      <div class="image-options">
        <button type="button" id="portraitBtn" class="active" onclick="setImageMode('portrait')">세로로 하기</button>
        <button type="button" id="landscapeBtn" onclick="setImageMode('landscape')">가로로 하기</button>
      </div>
    </div>

    <div id="fields"></div>

    <button class="btn" onclick="addField()">칸 추가</button>
    <button class="btn secondary" onclick="addSection()">구분 제목 추가</button>
    <button class="btn secondary" onclick="togglePrintMode()">스크린샷 모드</button>
    <p class="small">스크린샷 모드에서 📷 이미지 저장을 누르면 설정표만 PNG로 저장됩니다.</p>
  </section>

  <section class="preview" id="captureArea">
    <div class="wiki-title">
      <div class="ko" id="pTitleKo"></div>
      <div class="en" id="pTitleEn"></div>
    </div>
    <div class="image-box portrait" id="pImage">IMAGE</div>
    <table class="info-table"><tbody id="previewTable"></tbody></table>
  </section>
</main>

<section class="org-screen hidden" id="orgScreen">
  <section class="panel">
    <h2>조직도 만들기</h2>

    <div class="field">
      <label>상단 소속명</label>
      <input id="orgTopName" value="HΣΛTWΔRΞ 정부" oninput="renderOrgChart()">
    </div>

    <div class="field">
      <label>상단 작은 국기/상징 이미지</label>
      <input type="file" accept="image/*" onchange="loadOrgLogo(event)">
    </div>

    <div class="field">
      <label>큰 제목</label>
      <input id="orgMainTitle" value="행정각부" oninput="renderOrgChart()">
    </div>

    <div class="field">
      <label>부제</label>
      <input id="orgSubtitle" value="19부 18청 + [ 펼치기 · 접기 ]" oninput="renderOrgChart()">
    </div>

    <div class="field">
      <label>하단 설명</label>
      <textarea id="orgNote" oninput="renderOrgChart()">*19부 19청 예정
참자: 신설 예정, 폐지 예정</textarea>
    </div>

    <div class="row">
      <div class="field">
        <label>상단/기관 칸 색상</label>
        <input type="color" id="orgMainColor" value="#06456f" oninput="setOrgColors()">
      </div>
      <div class="field">
        <label>기관 글씨 색상</label>
        <input type="color" id="orgTextColor" value="#ffd400" oninput="setOrgColors()">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>하위기관 칸 색상</label>
        <input type="color" id="orgSubColor" value="#bfd0e3" oninput="setOrgColors()">
      </div>
      <div class="field">
        <label>하위기관 배지 색상</label>
        <input type="color" id="orgBadgeColor" value="#1f6fa7" oninput="setOrgColors()">
      </div>
    </div>

    <div class="field">
      <label>하단 설명 칸 색상</label>
      <input type="color" id="orgNoteColor" value="#f2f2f2" oninput="setOrgColors()">
    </div>

    <h3 style="margin:18px 0 10px;border-left:4px solid var(--accent2);padding-left:8px">기관 편집</h3>
    <div class="org-controls-row">
      <button class="btn" onclick="addOrgCell()">기관 칸 추가</button>
      <button class="btn secondary" onclick="addBlankOrgCell()">빈칸 추가</button>
    </div>
    <button class="btn secondary" onclick="removeLastOrgCell()">마지막 칸 삭제</button>
    <button class="btn secondary" onclick="togglePrintMode()">스크린샷 모드</button>

    <p class="small">하위기관은 쉼표로 구분하면 작은 파란 배지로 표시됩니다.</p>

    <div id="orgFields"></div>

<h3 style="margin:18px 0 10px;border-left:4px solid var(--accent2);padding-left:8px">범례 편집</h3>
    <div id="legendFields"></div>
    <button class="btn secondary" onclick="addLegendItem()">범례 추가</button>
    <button class="btn secondary" onclick="removeLastLegendItem()">마지막 범례 삭제</button>

    
  </section>

  <section class="org-preview" id="orgCaptureArea">
    <div class="gov-chart">
      <div class="gov-top">
        <div class="gov-logo-line"><span class="gov-logo-mark" id="orgLogoMark">◉</span><span id="orgPreviewTopName">HΣΛTWΔRΞ 정부</span></div>
        <div class="gov-main-title" id="orgPreviewMainTitle">행정각부</div>
      </div>
      <div class="gov-subtitle" id="orgPreviewSubtitle">19부 18청 + [ 펼치기 · 접기 ]</div>
      <div class="org-grid" id="orgGrid"></div>
      <div class="org-note" id="orgPreviewNote"></div>
      <div class="org-legend-title">중앙행정기관 상급 기관장 · 중앙행정기관 하급 기관장</div>
      <div class="org-legend" id="orgLegend"></div>
    </div>
  </section>
</section>

<script>
let currentType='nation';

const templates={
  nation:[
    ['__section','국가 상징'],['국명',''],['영문명',''],['국기',''],['국장',''],['표어',''],['국가',''],
    ['__section','기본 정보'],['수도',''],['최대도시',''],['위치',''],['면적',''],['인구',''],['공용어',''],['화폐',''],['국교',''],
    ['__section','정치'],['정치체제',''],['국가원수',''],['정부수반',''],['입법부',''],['주요 정당',''],

function hideAllScreens(){
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('editorScreen').classList.add('hidden');
  document.getElementById('orgScreen').classList.add('hidden');
  document.body.classList.remove('print-mode');
}

function setActiveNav(id){
  document.querySelectorAll('.menu button').forEach(btn=>btn.classList.remove('active'));
  const target=document.getElementById(id);
  if(target) target.classList.add('active');
}

function showHome(){
  hideAllScreens();
  document.getElementById('homeScreen').classList.remove('hidden');
  setActiveNav('navHome');
}

function showPage(type){
  hideAllScreens();
  currentType=type;
  document.getElementById('editorScreen').classList.remove('hidden');
  document.getElementById('editorTitle').textContent=pageNames[type];
  setActiveNav(type==='nation'?'navNation':type==='person'?'navPerson':'navGroup');

  document.getElementById('titleKo').value=type==='nation'?'국가명':type==='person'?'인물명':'단체명';
  document.getElementById('titleEn').value=type==='nation'?'Nation Profile':type==='person'?'Character Profile':'Organization Profile';

  setFields(templates[type]);
  setImageMode('portrait');
  render();
}

function setFields(arr){
  document.getElementById('fields').innerHTML='';
  arr.forEach(item=>{
    if(item[0]==='__section') addSection(item[1], false);
    else addField(item[0], item[1], false);
  });
  render();
}

function addField(label='', value='', doRender=true){
  const wrap=document.createElement('div');
  wrap.className='field item';
  wrap.innerHTML=`
    <label>항목명 <button class="remove" onclick="this.closest('.item').remove();render()">삭제</button></label>
    <input class="key" value="${escapeAttr(label)}" oninput="render()">
    <textarea class="val" oninput="render()">${escapeHtml(value)}</textarea>
  `;
  document.getElementById('fields').appendChild(wrap);
  if(doRender) render();
}

function addSection(label='구분', doRender=true){
  const wrap=document.createElement('div');
  wrap.className='field item section-item';
  wrap.dataset.section='true';
  wrap.innerHTML=`
    <label>구분 제목 <button class="remove" onclick="this.closest('.item').remove();render()">삭제</button></label>
    <input class="key" value="${escapeAttr(label)}" oninput="render()">
    <textarea class="val"></textarea>
  `;
  document.getElementById('fields').appendChild(wrap);
  if(doRender) render();
}

function render(){
  document.getElementById('pTitleKo').textContent=document.getElementById('titleKo').value || '제목';
  document.getElementById('pTitleEn').textContent=document.getElementById('titleEn').value || 'Subtitle';

  const tbody=document.getElementById('previewTable');
  tbody.innerHTML='';

  document.querySelectorAll('.item').forEach(item=>{
    const key=item.querySelector('.key').value || '항목';
    const val=item.querySelector('.val').value || ' ';
    if(item.dataset.section==='true'){
      tbody.innerHTML += `<tr class="section-title"><td colspan="2">${escapeHtml(key)}</td></tr>`;
    }else{
      tbody.innerHTML += `<tr><th>${escapeHtml(key)}</th><td>${escapeHtml(val)}</td></tr>`;
    }
  });
}

function loadImage(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    document.getElementById('pImage').innerHTML=`<img src="${reader.result}" alt="대표 이미지">`;
  };
  reader.readAsDataURL(file);
}

function setImageMode(mode){
  const box=document.getElementById('pImage');
  box.classList.remove('portrait','landscape');
  box.classList.add(mode);

  document.getElementById('portraitBtn').classList.toggle('active', mode==='portrait');
  document.getElementById('landscapeBtn').classList.toggle('active', mode==='landscape');
}

function setBoxColor(value){
  document.documentElement.style.setProperty('--boxColor', value);
}

function showOrgChart(){
  hideAllScreens();
  document.getElementById('orgScreen').classList.remove('hidden');
  setActiveNav('navOrg');

  const box=document.getElementById('orgFields');
  if(box.children.length===0){
    orgDefaultGov.forEach(item=>addOrgCell(item.name, item.subs, false));
  }

  const legendBox=document.getElementById('legendFields');
  if(legendBox.children.length===0){
    orgDefaultLegends.forEach(item=>addLegendItem(item.icon, item.text, item.bg, item.color, false));
  }

  setOrgColors();
  renderOrgChart();
}

function addOrgCell(name='', subs='', doRender=true){
  const wrap=document.createElement('div');
  wrap.className='org-item';
  wrap.dataset.blank='false';
  wrap.innerHTML=`
    <label>기관명</label>
    <input class="org-name-input" value="${escapeAttr(name)}" oninput="renderOrgChart()">
    <label>하위기관</label>
    <textarea class="org-sub-input" oninput="renderOrgChart()">${escapeHtml(subs)}</textarea>
    <button class="remove" onclick="this.closest('.org-item').remove();renderOrgChart()">삭제</button>
  `;
  document.getElementById('orgFields').appendChild(wrap);
  if(doRender) renderOrgChart();
}

function addBlankOrgCell(){
  const wrap=document.createElement('div');
  wrap.className='org-item';
  wrap.dataset.blank='true';
  wrap.innerHTML=`
    <label>빈칸</label>
    <input class="org-name-input" value="빈칸" disabled>
    <textarea class="org-sub-input" disabled></textarea>
    <button class="remove" onclick="this.closest('.org-item').remove();renderOrgChart()">삭제</button>
  `;
  document.getElementById('orgFields').appendChild(wrap);
  renderOrgChart();

function removeLastOrgCell(){
  const box=document.getElementById('orgFields');

  renderOrgChart();
}


function setOrgColors(){
  document.documentElement.style.setProperty('--orgMain', document.getElementById('orgMainColor').value);
  document.documentElement.style.setProperty('--orgText', document.getElementById('orgTextColor').value);
  document.documentElement.style.setProperty('--orgSub', document.getElementById('orgSubColor').value);

function addLegendItem(icon='◉', text='새 범례', bg='#ffffff', color='#111111', doRender=true){

  wrap.className='legend-item';
  wrap.innerHTML=`

      <div>

        <input type="color" class="legend-color-input" value="${escapeAttr(color)}" oninput="renderOrgChart()">
      </div>
    </div>
    <button class="remove" onclick="this.closest('.legend-item').remove();renderOrgChart()">삭제</button>

  document.getElementById('legendFields').appendChild(wrap);
  if(doRender) renderOrgChart();
}

function removeLastLegendItem(){
  const box=document.getElementById('legendFields');
  if(box.lastElementChild) box.lastElementChild.remove();
  renderOrgChart();
}

function renderLegend(){
  const legend=document.getElementById('orgLegend');
  if(!legend) return;
  legend.innerHTML='';

  document.querySelectorAll('.legend-item').forEach(item=>{
    const icon=item.querySelector('.legend-icon-input').value || '';
    const text=item.querySelector('.legend-text-input').value || '범례';
    const bg=item.querySelector('.legend-bg-input').value || '#ffffff';
    const color=item.querySelector('.legend-color-input').value || '#111111';

    const span=document.createElement('span');
    span.className='legend-badge';
    span.style.backgroundColor=bg;
    span.style.color=color;
    span.textContent=(icon ? icon + ' ' : '') + text;
    legend.appendChild(span);
  });
}


function loadOrgLogo(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=()=>{
    const mark=document.getElementById('orgLogoMark');
    mark.innerHTML=`<img src="${reader.result}" alt="상징 이미지">`;
  };
  reader.readAsDataURL(file);
}

function renderOrgChart(){
  document.getElementById('orgPreviewTopName').textContent=document.getElementById('orgTopName').value || '정부';
  document.getElementById('orgPreviewMainTitle').textContent=document.getElementById('orgMainTitle').value || '조직도';
  document.getElementById('orgPreviewSubtitle').textContent=document.getElementById('orgSubtitle').value || ' ';
  document.getElementById('orgPreviewNote').textContent=document.getElementById('orgNote').value || ' ';

  const grid=document.getElementById('orgGrid');
  grid.innerHTML='';

  document.querySelectorAll('.org-item').forEach(item=>{
    const cell=document.createElement('div');

    if(item.dataset.blank==='true'){
      cell.className='org-cell blank';
      cell.innerHTML='<div class="org-name">&nbsp;</div><div class="org-sub">&nbsp;</div>';
      grid.appendChild(cell);
      return;
    }

    const name=item.querySelector('.org-name-input').value || '기관명';
    const subs=item.querySelector('.org-sub-input').value || '';
    const badges=subs.split(',').map(x=>x.trim()).filter(Boolean)
      .map(x=>`<span class="badge">${escapeHtml(x)}</span>`).join('');

    cell.className='org-cell';
    cell.innerHTML=`
      <div class="org-name">${escapeHtml(name)}</div>
      <div class="org-sub">${badges || '&nbsp;'}</div>
    `;
    grid.appendChild(cell);
  });

  renderLegend();
}

function togglePrintMode(){
  document.body.classList.toggle('print-mode');
}

async function saveAsImage(){
  const orgVisible=!document.getElementById('orgScreen').classList.contains('hidden');
  const target=orgVisible ? document.getElementById('orgCaptureArea') : document.getElementById('captureArea');

  if(!target){
    alert('저장할 영역을 찾지 못했습니다.');
    return;
  }

  document.body.classList.add('capturing');
  try{
    const canvas=await html2canvas(target,{
      scale:2,
      backgroundColor:'#070707',
      useCORS:true,
      logging:false
    });

    const a=document.createElement('a');
    const title=orgVisible
      ? document.getElementById('orgPreviewMainTitle').textContent
      : document.getElementById('pTitleKo').textContent;

    const name=(title || 'HΣΛTWΔRΞ_설정표')
      .replace(/[\/:*?"<>|\s]+/g,'_')
      .slice(0,40);

    a.download=name+'.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  }catch(err){
    console.error(err);
    alert('이미지 저장 실패. 인터넷 연결 상태를 확인하거나 다시 시도해주세요.');
  }finally{
    document.body.classList.remove('capturing');
  }
}

function escapeHtml(text){
  return String(text).replace(/[&<>'"]/g, c=>({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    "'":'&#39;',
    '"':'&quot;'
  }[c]));
}
function escapeAttr(text){
  return escapeHtml(text).replace(/`/g,'&#96;');
}
